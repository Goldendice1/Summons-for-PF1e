name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF_NAME}
          VERSION=${TAG#v}
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Update module.json version and download URL
        run: |
          TAG=${{ steps.version.outputs.tag }}
          VERSION=${{ steps.version.outputs.version }}
          jq --arg version "$VERSION" \
             --arg download "https://github.com/Goldendice1/Summons-for-PF1e/releases/download/${TAG}/summons-for-pf1e.zip" \
             '.version = $version | .download = $download' \
             module.json > module.json.tmp && mv module.json.tmp module.json

      - name: Build package
        run: bash package.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/summons-for-pf1e-v${{ steps.version.outputs.version }}.zip
            module.json
