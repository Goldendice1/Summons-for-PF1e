name: Update Test Manifest

on:
  push:
    branches-ignore:
      - main
      - test/**

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Patch module.json and push to test branch
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          TEST_BRANCH="test/${BRANCH}"
          MANIFEST="https://raw.githubusercontent.com/Goldendice1/Summons-for-PF1e/${TEST_BRANCH}/module.json"
          DOWNLOAD="https://github.com/Goldendice1/Summons-for-PF1e/archive/refs/heads/${BRANCH}.zip"

          jq --arg manifest "$MANIFEST" \
             --arg download "$DOWNLOAD" \
             '.manifest = $manifest | .download = $download' \
             module.json > module.json.tmp && mv module.json.tmp module.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add module.json
          git commit -m "chore: test manifest for ${BRANCH}"
          git push origin HEAD:"${TEST_BRANCH}" --force
