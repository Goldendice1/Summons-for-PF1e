name: Cleanup Test Branch

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete test branch
        run: |
          TEST_BRANCH="test/${{ github.head_ref }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/Goldendice1/Summons-for-PF1e/git/refs/heads/${TEST_BRANCH}")
          if [ "$STATUS" = "200" ]; then
            curl -s -X DELETE \
              -H "Authorization: Bearer ${{ github.token }}" \
              "https://api.github.com/repos/Goldendice1/Summons-for-PF1e/git/refs/heads/${TEST_BRANCH}"
            echo "Deleted ${TEST_BRANCH}"
          else
            echo "No test branch found for ${TEST_BRANCH}, nothing to do"
          fi
